<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="520" viewBox="0 0 1200 520" role="img" aria-labelledby="title desc">
  <title id="title">Diffdeck workflow infographic</title>
  <desc id="desc">Run git diff or diffdeck in the terminal, open a browser diff view, add comments on lines, then copy or export comments.</desc>
  <defs>
    <linearGradient id="panel" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#f7f8fb"/>
    </linearGradient>
    <linearGradient id="terminal" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#111827"/>
      <stop offset="1" stop-color="#171923"/>
    </linearGradient>
    <filter id="shadow" x="-8%" y="-12%" width="116%" height="128%">
      <feDropShadow dx="0" dy="12" stdDeviation="18" flood-color="#111827" flood-opacity="0.14"/>
    </filter>
    <style>
      .bg { fill: #fbfbfd; }
      .card { fill: url(#panel); stroke: #d9dce5; stroke-width: 1.5; }
      .muted { fill: #667085; }
      .ink { fill: #111827; }
      .soft { fill: #f0f2f6; }
      .line { stroke: #d9dce5; stroke-width: 2; }
      .arrow { stroke: #2563eb; stroke-width: 3; stroke-linecap: round; stroke-linejoin: round; fill: none; }
      .label { font: 700 20px ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; letter-spacing: 0; }
      .small { font: 600 14px ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; letter-spacing: 0; }
      .tiny { font: 500 12px ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; letter-spacing: 0; }
      .mono { font: 600 15px ui-monospace, "SFMono-Regular", Menlo, Consolas, monospace; letter-spacing: 0; }
    </style>
  </defs>

  <rect class="bg" width="1200" height="520" rx="28"/>
  <rect x="42" y="42" width="1116" height="436" rx="22" fill="#ffffff" stroke="#e5e7ee"/>

  <text x="84" y="96" class="label ink">Diffdeck turns terminal diffs into a focused browser review.</text>
  <text x="84" y="126" class="small muted">View changes, mark lines, and copy comments without leaving your Git flow.</text>

  <g filter="url(#shadow)">
    <rect x="84" y="178" width="248" height="198" rx="16" fill="url(#terminal)"/>
    <circle cx="111" cy="203" r="6" fill="#ef4444"/>
    <circle cx="132" cy="203" r="6" fill="#f59e0b"/>
    <circle cx="153" cy="203" r="6" fill="#22c55e"/>
    <text x="111" y="249" class="mono" fill="#d1d5db">$ git diff</text>
    <text x="111" y="282" class="mono" fill="#d1d5db">$ diffdeck</text>
    <rect x="110" y="307" width="150" height="11" rx="5.5" fill="#374151"/>
    <rect x="110" y="330" width="190" height="11" rx="5.5" fill="#374151"/>
    <rect x="110" y="353" width="116" height="11" rx="5.5" fill="#374151"/>
  </g>
  <text x="84" y="412" class="small ink">1. Run a diff</text>
  <text x="84" y="436" class="tiny muted">Git args pass through.</text>

  <path class="arrow" d="M356 277H440"/>
  <path class="arrow" d="M425 260l17 17-17 17"/>

  <g filter="url(#shadow)">
    <rect x="470" y="166" width="360" height="222" rx="16" class="card"/>
    <rect x="470" y="166" width="360" height="38" rx="16" fill="#f3f4f8"/>
    <rect x="470" y="190" width="360" height="14" fill="#f3f4f8"/>
    <circle cx="497" cy="185" r="5" fill="#c4c8d2"/>
    <circle cx="516" cy="185" r="5" fill="#c4c8d2"/>
    <circle cx="535" cy="185" r="5" fill="#c4c8d2"/>
    <rect x="494" y="226" width="88" height="138" rx="8" fill="#f0f2f6"/>
    <rect x="512" y="247" width="50" height="8" rx="4" fill="#98a2b3"/>
    <rect x="512" y="272" width="42" height="8" rx="4" fill="#c4c8d2"/>
    <rect x="512" y="297" width="54" height="8" rx="4" fill="#c4c8d2"/>
    <rect x="512" y="322" width="36" height="8" rx="4" fill="#c4c8d2"/>
    <rect x="607" y="229" width="185" height="18" rx="5" fill="#e9eefb"/>
    <rect x="607" y="262" width="160" height="12" rx="6" fill="#fee2e2"/>
    <rect x="607" y="286" width="196" height="12" rx="6" fill="#dcfce7"/>
    <rect x="607" y="310" width="142" height="12" rx="6" fill="#dcfce7"/>
    <rect x="607" y="342" width="178" height="12" rx="6" fill="#e5e7eb"/>
    <text x="621" y="243" class="tiny" fill="#2563eb">src/app.tsx</text>
    <text x="619" y="273" class="tiny" fill="#b91c1c">- old handler</text>
    <text x="619" y="297" class="tiny" fill="#15803d">+ review pane</text>
    <text x="619" y="321" class="tiny" fill="#15803d">+ line notes</text>
  </g>
  <text x="470" y="424" class="small ink">2. Review in browser</text>
  <text x="470" y="448" class="tiny muted">Files, hunks, and lines stay scannable.</text>

  <path class="arrow" d="M854 277H924"/>
  <path class="arrow" d="M909 260l17 17-17 17"/>

  <g filter="url(#shadow)">
    <rect x="952" y="170" width="164" height="78" rx="14" class="card"/>
    <circle cx="981" cy="203" r="12" fill="#dbeafe"/>
    <path d="M976 203h10M981 198v10" stroke="#2563eb" stroke-width="2.4" stroke-linecap="round"/>
    <text x="1006" y="199" class="small ink">Comment</text>
    <text x="1006" y="221" class="tiny muted">on a line</text>
    <path d="M958 285c0-11 9-20 20-20h116c11 0 20 9 20 20v46c0 11-9 20-20 20h-69l-29 24v-24h-18c-11 0-20-9-20-20z" fill="#fff7ed" stroke="#fed7aa" stroke-width="1.5"/>
    <text x="981" y="298" class="tiny" fill="#9a3412">Needs a guard</text>
    <text x="981" y="319" class="tiny" fill="#9a3412">before export.</text>
  </g>
  <text x="952" y="424" class="small ink">3. Add comments</text>
  <text x="952" y="448" class="tiny muted">Attach notes to exact lines.</text>

  <g>
    <path class="line" d="M1034 376v35"/>
    <path class="arrow" d="M1034 411h-98"/>
    <path class="arrow" d="M951 394l-17 17 17 17"/>
  </g>

  <g filter="url(#shadow)">
    <rect x="706" y="394" width="164" height="58" rx="14" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1.5"/>
    <path d="M741 418h35v24h-35z" fill="#ffffff" stroke="#2563eb" stroke-width="2"/>
    <path d="M750 410h35v24h-35z" fill="#ffffff" stroke="#2563eb" stroke-width="2"/>
    <path d="M802 424h34" stroke="#2563eb" stroke-width="3" stroke-linecap="round"/>
    <path d="M802 439h22" stroke="#2563eb" stroke-width="3" stroke-linecap="round"/>
  </g>
  <text x="706" y="484" class="small ink">4. Copy / export</text>
</svg>
